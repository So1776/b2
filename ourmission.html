<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Our Mission - Internly</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: #333;
      background: #f9f9f9;
    }

    /* CANVAS BACKGROUND (ANIMATION) */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    /* HEADER */
    header {
      background: linear-gradient(90deg, #07294D, #FFC600);
      padding: 20px;
      border-bottom: 1px solid #aaa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      text-decoration: none;
    }

    .logo:hover {
      text-decoration: underline;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      font-weight: bold;
    }

    .nav-links a,
    .nav-links span {
      color: white;
      text-decoration: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .nav-links a:hover,
    .nav-links span:hover {
      text-decoration: underline;
    }

    .login {
      background: #07294D;
      color: #FFC600;
      padding: 10px 15px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }

    /* CENTER CONTENT */
    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: calc(100vh - 100px);
      padding: 0 20px;
    }

    /* ANIMATION FROM INDEX */
    main h1,
    main p {
      opacity: 0;
      transform: translateY(50px);
      animation: riseUp 1s forwards;
    }

    main h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      color: #07294D;
    }

    main p {
      animation-delay: 0.3s;
      font-size: 1.2rem;
      color: #555;
      max-width: 650px;
      line-height: 1.6;
    }

    @keyframes riseUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

<!-- BACKGROUND ANIMATION -->
<canvas id="network"></canvas>

<script>
const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

let width, height;
let points = [];

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;

  points = [];
  for (let i = 0; i < 80; i++) {
    points.push({
      x: Math.random() * width,
      y: Math.random() * height,
      vx: (Math.random() - 0.5) * 0.6,
      vy: (Math.random() - 0.5) * 0.6
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, width, height);

  for (let i = 0; i < points.length; i++) {
    let p = points[i];

    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > width) p.vx *= -1;
    if (p.y < 0 || p.y > height) p.vy *= -1;

    ctx.fillStyle = "rgba(255, 198, 0, 0.65)";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

window.addEventListener("resize", resize);

resize();
draw();
</script>

<header>
  <div class="header-left">
    <a href="index.html" class="logo">Internly</a>

    <div class="nav-links">
      <span>Our Mission</span>
      <span>Find Internships</span>
      <span>Track Your Progress</span>
      <span>About Us</span>
    </div>
  </div>

  <a href="login.html" class="login">Login</a>
</header>

<main>
  <h1>Our Mission</h1>
  <p>
    Internly is built to simplify the internship search process.
    We help students discover opportunities, organize applications,
    and track progress all in one place.
  </p>
</main>

</body>
</html>
