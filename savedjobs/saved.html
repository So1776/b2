<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Saved Jobs</title>

    <!-- Modified by; Caleb Perez, 04/26/26 -->
  <link rel="stylesheet" href="/savedjobs/saved.css">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<header>
  <div class="header-left">
    <a href="../dashboard/dashboard.html" class="logo">Internly</a>

<!-- Nav links Modified by Caleb Perez, 04/26/26 -->

    <div class="nav-item" onclick="window.location.href='/dashboard'">
  <i class="fas fa-briefcase"></i> Jobs
</div>

     <div class="nav-item" onclick="window.location.href='/resume-page'">
  <i class="fas fa-file-alt"></i> Resume
</div>

      <div class="nav-item active">
        <i class="fas fa-bookmark"></i> Saved
      </div>
    </div>
  </div>

  <div class="header-right">
    <button class="settings-btn" onclick="window.location.href='/settings'">
      <i class="fas fa-cog"></i> Settings
    </button>
    <a href="/login" class="logout">Logout</a>
  </div>
</header>
<main>

  <section class="saved-section">
    <h1>Saved Jobs</h1>
    <p style="color:#352a2a;">Your saved jobs will appear here.</p>

    <div id="savedJobsContainer" class="saved-jobs-container">
      <!-- Saved job cards will be inserted here -->
    </div>
  </section>

</main>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const container = document.getElementById("savedJobsContainer");

  // Get saved jobs from localStorage
  const savedJobs = JSON.parse(localStorage.getItem("savedJobs")) || [];

  // Empty state
  if (savedJobs.length === 0) {
    container.innerHTML = "<p>No saved jobs yet.</p>";
    return;
  }

  // Render each saved job
  savedJobs.forEach(job => {
    const card = document.createElement("div");
    card.className = "saved-job-card";

    card.innerHTML = `
      <h2>${job.title}</h2>
      <p><strong>Salary:</strong> ${job.salary}</p>
      <p><strong>Location:</strong> ${job.location}</p>
      <p>${job.description}</p>
      <button class="remove-btn">Remove</button>
    `;

    // Remove button
    card.querySelector(".remove-btn").addEventListener("click", function() {
      removeJob(job.id);
    });

    container.appendChild(card);
  });

});

// Remove function
function removeJob(id) {
  let savedJobs = JSON.parse(localStorage.getItem("savedJobs")) || [];

  savedJobs = savedJobs.filter(job => job.id !== id);

  localStorage.setItem("savedJobs", JSON.stringify(savedJobs));

  location.reload();
}
</script>

</body>
</html>
