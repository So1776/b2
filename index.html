<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing Page</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      line-height: 1.5;
    }

    header, main, footer {
      padding: 2rem;
    }

    header {
      background: #f4f4f4;
      border-bottom: 1px solid #ddd;
    }

    main {
      background: #ffffff;
      min-height: 60vh;
    }

    footer {
      background: #f4f4f4;
      border-top: 1px solid #ddd;
      text-align: center;
    }

    .section {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>

<body>

  <header>
    <h1>Welcome to to our (blank)</h1>
  </header>

  <main>
    <div class="section">
      <h2>About</h2>
      <p>what this website does</p>
    </div>

    <div class="section">
      <h2>Features</h2>
      <p>features and benefits</p>
    </div>

    <div class="section">
      <h2>Call to Action</h2>
      <p>encouragement for the users to use the site</p>
    </div>
  </main>

  <footer>
    <p></p>
  </footer>

</body>
</html>
