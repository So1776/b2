<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Internship Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      color: #333;
    }

    header {
      background: #dcdcdc;
      padding: 20px;
      border-bottom: 1px solid #aaa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .header-left h1 {
      margin: 0;
      font-size: 1.8rem;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      font-weight: bold;
      cursor: pointer;
    }

    .signup {
      background: #007BFF;
      color: white;
      padding: 10px 15px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: calc(100vh - 100px);
      padding: 0 20px;
      overflow: hidden; /* ensures text coming from bottom is hidden initially */
    }

    main h2, main p {
      opacity: 0;
      transform: translateY(50px);
      animation: riseUp 1s forwards;
    }

    main p {
      animation-delay: 0.3s; /* delay paragraph slightly after heading */
    }

    @keyframes riseUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    main h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    main p {
      font-size: 1.2rem;
      color: #555;
      max-width: 600px;
    }

    footer {
      background: #dcdcdc;
      padding: 20px;
      border-top: 1px solid #aaa;
      text-align: center;
    }
  </style>
</head>

<body>

  <header>
    <div class="header-left">
      <h1>Internship Tracker</h1>
      <div class="nav-links">
        <span>Our Mission</span>
        <span>Find Internships</span>
        <span>Track Your Progress</span>
      </div>
    </div>
    <a href="login.html" class="signup">Login</a>
  </header>

  <main>
    <h2>Simplify and organize your internship search</h2>
    <p>Discover real-time internships and track your applications with ease</p>
  </main>

  <footer>
    <p></p>
  </footer>

</body>
</html>
