<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Internly</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: #333;
      background: #f9f9f9;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    header {
      background: linear-gradient(90deg, #07294D, #FFC600);
      padding: 20px;
      border-bottom: 1px solid #aaa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    /* ✅ UPDATED LOGO WITH ANIMATED UNDERLINE */
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      text-decoration: none;
      position: relative;
      display: inline-block;
      padding-bottom: 4px;
    }

    .logo::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 0%;
      height: 2px;
      background: white;
      transition: width 0.3s ease;
    }

    .logo:hover::after {
      width: 100%;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      font-weight: bold;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
      cursor: pointer;
      transition: 0.3s;
    }

    .nav-links a:hover {
      text-decoration: underline;
    }

    .nav-links span {
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .nav-links span:hover {
      text-decoration: underline;
    }

    .login {
      background: #07294D;
      color: #FFC600;
      padding: 10px 15px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      height: calc(100vh - 100px);
      padding: 0 20px;
    }

    main h2, main p {
      opacity: 0;
      transform: translateY(50px);
      animation: riseUp 1s forwards;
    }

    main p {
      animation-delay: 0.3s;
      font-size: 1.2rem;
      color: #555;
      max-width: 600px;
    }

    @keyframes riseUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    main h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    footer {
      background: #dcdcdc;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>

<body>

<canvas id="network"></canvas>

<script>
const canvas = document.getElementById("network");
const ctx = canvas.getContext("2d");

let width, height;
let points = [];

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;

  points = [];
  for (let i = 0; i < 80; i++) {
    points.push({
      x: Math.random() * width,
      y: Math.random() * height,
      vx: (Math.random() - 0.5) * 0.6,
      vy: (Math.random() - 0.5) * 0.6
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, width, height);

  for (let i = 0; i < points.length; i++) {
    let p = points[i];

    p.x += p.vx;
    p.y += p.vy;

    if (p.x < 0 || p.x > width) p.vx *= -1;
    if (p.y < 0 || p.y > height) p.vy *= -1;

    ctx.fillStyle = "rgba(255, 198, 0, 0.65)";
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

window.addEventListener("resize", resize);

resize();
draw();
</script>

<header>
  <div class="header-left">
    <a href="./index.html" class="logo">Internly</a>

    <div class="nav-links">
      <a href="ourmission.html">Our Mission</a>
      <span>Find Internships</span>
      <span>Track Your Progress</span>
      <span>About Us</span>
    </div>
  </div>

  <a href="login.html" class="login">Login</a>
</header>

<main>
  <h2>Simplify and organize your internship search</h2>
  <p>Discover real-time internships and track your applications with ease</p>
</main>

<footer>
  <p></p>
</footer>

</body>
</html>
