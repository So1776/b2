<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>

    <div class="profile-container">
        <h1 class="title">Your Profile</h1>

        <form class="profile-form">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input id="name" type="text" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="major">Major / Program</label>
                <input id="major" type="text" placeholder="e.g., Computer Science">
            </div>

            <div class="form-group">
                <label for="gradYear">Graduation Year</label>
                <input id="gradYear" type="number" placeholder="2027">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="bio">Short Bio (optional)</label>
                <textarea id="bio" placeholder="Tell us a bit about yourself..."></textarea>
            </div>

            <div class="form-group">
                <label for="resume">Upload Resume (PDF)</label>
                <input id="resume" type="file" accept="application/pdf">
                <p class="file-note">PDF only • Max 5MB</p>
            </div>

            <button class="submit-btn">Save Profile</button>
        </form>
    </div>

</body>
</html>
