<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login - Internship Tracker</title>

  <link rel="stylesheet" href="/loginpage/login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
  <a href="/frontpage/front.html" class="logo">Internly</a>
</header>

<div class="page-wrapper">

  <div class="login-card">

    <div class="left-side">
      <div class="i-logo">I</div>
      <p>Login To Internly</p>
    </div>

    <div class="right-side">

      <h2>Log In</h2>

      <form id="loginForm">
        <label>Email Address:</label>
        <input type="email" id="email">
        <span class="error-message" id="emailError"></span>

        <label>Password:</label>
        <div class="password-container">
          <input type="password" id="password">
          <span id="togglePassword" class="eye">
            <i class="fa-solid fa-eye"></i>
          </span>
        </div>
        <span class="error-message" id="passwordError"></span>

        <p class="register-text">
          New to the website?
          <a href="../registerpage/signup.html">Register here</a>
        </p>

        <button type="submit">Log In</button>
      </form>

    </div>
  </div>

</div>

<script>
  const form = document.getElementById("loginForm");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const emailError = document.getElementById("emailError");
  const passwordError = document.getElementById("passwordError");

  const togglePassword = document.getElementById("togglePassword");
  const eyeIcon = togglePassword.querySelector("i");

  togglePassword.addEventListener("click", function () {
    const isPassword = passwordInput.type === "password";
    passwordInput.type = isPassword ? "text" : "password";
    eyeIcon.classList.toggle("fa-eye");
    eyeIcon.classList.toggle("fa-eye-slash");
  });

  form.addEventListener("submit", async function(event) {
    event.preventDefault();

    let isValid = true;

    emailInput.classList.remove("error");
    passwordInput.classList.remove("error");
    emailError.textContent = "";
    passwordError.textContent = "";

    if (emailInput.value.trim() === "") {
      emailInput.classList.add("error");
      emailError.textContent = "Please enter your email.";
      isValid = false;
    }

    if (passwordInput.value.trim() === "") {
      passwordInput.classList.add("error");
      passwordError.textContent = "Please enter your password.";
      isValid = false;
    }

    if (isValid) {
      try {
        const res = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: emailInput.value.trim(),
            password: passwordInput.value.trim()
          })
        });

        const data = await res.json();

        if (!res.ok) {
          passwordError.textContent = data.error || "Login failed.";
          return;
        }

        localStorage.setItem("token", data.token);
        window.location.href = "/dashboard";
      } catch (err) {
        passwordError.textContent = "Server error. Try again.";
      }
    }
  });
</script>

</body>
</html>
