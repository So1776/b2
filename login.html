<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login - Internship Tracker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      color: #333;
    }

    header {
      background: #dcdcdc;
      padding: 20px;
      border-bottom: 1px solid #aaa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header strong {
      font-size: 1.8rem;
    }

    nav a {
      margin-left: 1.5rem;
      font-weight: bold;
      text-decoration: none;
      color: #333;
    }

    .form-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 100px);
      padding: 0 20px;
      text-align: center;
    }

    .form-section h2 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      background: #fff;
      padding: 30px 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    label {
      text-align: left;
      font-weight: bold;
      margin-top: 10px;
    }

    input {
      padding: 10px;
      border: 1px solid #aaa;
      border-radius: 5px;
      font-size: 1rem;
      width: 100%;
      box-sizing: border-box;
    }

    input.error {
      border: 2px solid red;
    }

    .error-message {
      color: red;
      font-size: 0.85rem;
      text-align: left;
      height: 16px;
    }

    .password-container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-container input {
      width: 100%;
    }

    .eye {
      position: absolute;
      right: 10px;
      cursor: pointer;
      font-size: 1.1rem;
      user-select: none;
    }

    .register-text {
      font-size: 0.95rem;
      margin-top: 10px;
    }

    .register-text a {
      color: #007BFF;
      font-weight: bold;
      text-decoration: none;
    }

    .register-text a:hover {
      text-decoration: underline;
    }

    button {
      padding: 10px;
      background: #007BFF;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 15px;
    }

    button:hover {
      background: #0056b3;
    }

    footer {
      background: #dcdcdc;
      padding: 20px;
      border-top: 1px solid #aaa;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <div><strong>Internship Tracker</strong></div>
  <nav>
    <a href="index.html">Home</a>
    <a href="#">Our Mission</a>
    <a href="#">Find Internships</a>
  </nav>
</header>

<section class="form-section">
  <h2>Log In</h2>

  <form id="loginForm">

    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email">
    <span class="error-message" id="emailError"></span>

    <label for="password">Password:</label>
    <div class="password-container">
      <input type="password" id="password" name="password">
      <span id="togglePassword" class="eye">👁</span>
    </div>
    <span class="error-message" id="passwordError"></span>

    <p class="register-text">
      New to the website?
      <a href="signup.html">Register here</a>
    </p>

    <button type="submit">Log In</button>
  </form>
</section>

<script>
  const form = document.getElementById("loginForm");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const emailError = document.getElementById("emailError");
  const passwordError = document.getElementById("passwordError");
  const togglePassword = document.getElementById("togglePassword");

  // Toggle password visibility
  togglePassword.addEventListener("click", function () {
    const isPassword = passwordInput.getAttribute("type") === "password";
    passwordInput.setAttribute("type", isPassword ? "text" : "password");
    togglePassword.textContent = isPassword ? "🙈" : "👁";
  });

  // Handle form submission
  form.addEventListener("submit", async function(event) {
    event.preventDefault();

    let isValid = true;

    // Reset previous errors
    emailInput.classList.remove("error");
    passwordInput.classList.remove("error");
    emailError.textContent = "";
    passwordError.textContent = "";

    // Email validation
    if (emailInput.value.trim() === "") {
      emailInput.classList.add("error");
      emailError.textContent = "Please enter your email.";
      isValid = false;
    }

    // Password validation
    if (passwordInput.value.trim() === "") {
      passwordInput.classList.add("error");
      passwordError.textContent = "Please enter your password.";
      isValid = false;
    }

    if (isValid) {
  try {
    // Send login request to backend
    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: emailInput.value.trim(),
        password: passwordInput.value.trim()
      })
    });

    const data = await res.json();

    if (!res.ok) {
      // show backend error (ex: Invalid email or password)
      passwordInput.classList.add("error");
      passwordError.textContent = data.error || "Login failed.";
      return; // IMPORTANT: stop redirect
    }

    // store token so future requests can be authenticated
    localStorage.setItem("token", data.token);

    // Redirect on real success
    window.location.href = "dashboard.html";
  } catch (err) {
    passwordError.textContent = "Server error. Try again.";
  }
}
  });
</script>

</body>
</html>
