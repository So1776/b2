<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login - Internship Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      color: #333;
    }

    header {
      background: #dcdcdc;
      padding: 20px;
      border-bottom: 1px solid #aaa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header strong {
      font-size: 1.8rem;
    }

    nav a {
      margin-left: 1.5rem;
      font-weight: bold;
      text-decoration: none;
      color: #333;
    }

    .form-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 100px);
      padding: 0 20px;
      text-align: center;
    }

    .form-section h2 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: #fff;
      padding: 30px 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    label {
      text-align: left;
      font-weight: bold;
    }

    input {
      padding: 10px;
      border: 1px solid #aaa;
      border-radius: 5px;
      font-size: 1rem;
    }

    .register-text {
      font-size: 0.95rem;
      margin-top: 5px;
    }

    .register-text a {
      color: #007BFF;
      font-weight: bold;
      text-decoration: none;
    }

    .register-text a:hover {
      text-decoration: underline;
    }

    button {
      padding: 10px;
      background: #007BFF;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 10px;
    }

    button:hover {
      background: #0056b3;
    }

    footer {
      background: #dcdcdc;
      padding: 20px;
      border-top: 1px solid #aaa;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <div><strong>Internship Tracker</strong></div>
  <nav>
    <a href="index.html">Home</a>
    <a href="#">Our Mission</a>
    <a href="#">Find Internships</a>
  </nav>
</header>

<section class="form-section">
  <h2>Log In</h2>

  <form id="loginForm">
    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email">

    <label for="password">Password:</label>
    <input type="password" id="password" name="password">

    <p class="register-text">
      New to the website?
      <a href="signup.html">Register here</a>
    </p>

    <button type="submit">Log In</button>
  </form>
</section>

<script>
  const form = document.getElementById("loginForm");

  form.addEventListener("submit", function(event) {
    event.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (email === "" || password === "") {
      alert("Please enter your email and password.");
    } else {
      alert("Login successful!");
      form.reset();
    }
  });
</script>

</body>
</html>
