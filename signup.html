<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Internship Tracker</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      /* Gradient background from dark blue to yellow */
      background: linear-gradient(135deg, #07294D, #FFC600);
      background-attachment: fixed;
      min-height: 100vh;
      color: #333;
    }

    header {
      background: #07294D; /* header color */
      padding: 20px;
      border-bottom: 1px solid #aaa;
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      font-size: 1.2rem;
    }

    a.logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: white;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.2s;
    }

    a.logo:hover {
      color: white;
      text-decoration: none;
    }

    .form-section {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 80px);
      padding: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 400px;
    }

    label {
      font-weight: bold;
      text-align: left;
    }

    input, select {
      padding: 12px;
      border: 1px solid #aaa;
      border-radius: 5px;
      font-size: 1rem;
      width: 100%;
      height: 46px;
      box-sizing: border-box;
      transition: border 0.3s;
    }

    .password-container {
      position: relative;
      width: 100%;
    }

    .password-container input {
      padding-right: 40px;
      height: 46px;
      box-sizing: border-box;
    }

    .password-container i {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #555;
    }

    .error {
      border: 2px solid red !important;
    }

    .success {
      border: 2px solid green !important;
    }

    .error-message {
      color: red;
      font-size: 0.85rem;
      visibility: hidden;
      height: 18px;
      margin-top: -5px;
      margin-bottom: 5px;
    }

    button {
      padding: 10px;
      background: #667eea;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s;
    }

    button:hover {
      background: #764ba2;
    }
  </style>
</head>

<body>

<header>
  <a href="./index.html" class="logo">Interly</a>
</header>

<section class="form-section">
  <form id="signupForm" novalidate>

    <h2>Create Your Account</h2>

    <label>Full Name:</label>
    <input type="text" id="name">
    <div class="error-message" id="nameError">Please enter both first and last name.</div>

    <label>Email Address:</label>
    <input type="email" id="email">
    <div class="error-message" id="emailError">Please enter a valid email address.</div>

    <label>Create Password:</label>
    <div class="password-container">
      <input type="password" id="password">
      <i class="fa-solid fa-eye" onclick="togglePassword('password', this)"></i>
    </div>
    <div class="error-message" id="passwordError">Password must be at least 12 characters and include a special character (!@#$%^&*()).</div>

    <label>Confirm Password:</label>
    <div class="password-container">
      <input type="password" id="confirmPassword">
      <i class="fa-solid fa-eye" onclick="togglePassword('confirmPassword', this)"></i>
    </div>
    <div class="error-message" id="confirmPasswordError">Passwords do not match.</div>

    <label>Major:</label>
    <select id="major">
      <option value="">Select Major</option>
      <option>Computer Science</option>
      <option>Computer Engineering</option>
      <option>Cybersecurity</option>
      <option>Business</option>
    </select>
    <div class="error-message" id="majorError">Please select a major.</div>

    <label>Graduation Year:</label>
    <select id="gradyear">
      <option value="">Select Year</option>
      <option>2026</option>
      <option>2027</option>
      <option>2028</option>
      <option>2029</option>
      <option>2030</option>
    </select>
    <div class="error-message" id="gradyearError">Please select a year.</div>

    <button type="submit">Create Account</button>

  </form>
</section>

<script>
  function togglePassword(fieldId, icon) {
    const input = document.getElementById(fieldId);
    if (input.type === "password") {
      input.type = "text";
      icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
      input.type = "password";
      icon.classList.replace("fa-eye-slash", "fa-eye");
    }
  }

  const form = document.getElementById("signupForm");
  const nameInput = document.getElementById("name");
  const emailInput = document.getElementById("email");
  const password = document.getElementById("password");
  const confirmPassword = document.getElementById("confirmPassword");
  const nameError = document.getElementById("nameError");
  const emailError = document.getElementById("emailError");
  const passwordError = document.getElementById("passwordError");
  const confirmPasswordError = document.getElementById("confirmPasswordError");

  nameInput.addEventListener("input", function() {
    const words = nameInput.value.trim().split(/\s+/);
    if (words.length >= 2) {
      nameInput.classList.remove("error");
      nameInput.classList.add("success");
      nameError.style.visibility = "hidden";
    } else {
      nameInput.classList.remove("success");
      nameInput.classList.add("error");
      nameError.style.visibility = "visible";
    }
  });

  emailInput.addEventListener("input", function() {
    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,}$/i;
    if (emailPattern.test(emailInput.value)) {
      emailInput.classList.remove("error");
      emailInput.classList.add("success");
      emailError.style.visibility = "hidden";
    } else {
      emailInput.classList.remove("success");
      emailInput.classList.add("error");
      emailError.style.visibility = "visible";
    }
  });

  password.addEventListener("input", function() {
    const specialCharPattern = /[!@#$%^&*()]/;
    if (password.value.length >= 12 && specialCharPattern.test(password.value)) {
      password.classList.remove("error");
      password.classList.add("success");
      passwordError.style.visibility = "hidden";
    } else {
      password.classList.remove("success");
      password.classList.add("error");
      passwordError.style.visibility = "visible";
    }
  });

  form.addEventListener("submit", async function(event) {
    event.preventDefault();
    console.log("Submit triggered");

    const major = document.getElementById("major");
    const gradyear = document.getElementById("gradyear");

    let hasError = false;

    document.querySelectorAll("input, select").forEach(el => {
      el.classList.remove("error");
      el.classList.remove("success");
    });
    document.querySelectorAll(".error-message").forEach(el => el.style.visibility = "hidden");

    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,}$/i;
    const specialCharPattern = /[!@#$%^&*()]/;

    if (nameInput.value.trim().split(/\s+/).length < 2) {
      nameInput.classList.add("error");
      nameError.style.visibility = "visible";
      hasError = true;
    } else {
      nameInput.classList.add("success");
    }

    if (!emailPattern.test(emailInput.value)) {
      emailInput.classList.add("error");
      emailError.style.visibility = "visible";
      hasError = true;
    } else {
      emailInput.classList.add("success");
    }

    if (password.value.length < 12 || !specialCharPattern.test(password.value)) {
      password.classList.add("error");
      passwordError.style.visibility = "visible";
      hasError = true;
    } else {
      password.classList.add("success");
    }

    if (password.value !== confirmPassword.value || confirmPassword.value === "") {
      confirmPassword.classList.add("error");
      confirmPasswordError.style.visibility = "visible";
      hasError = true;
    } else {
      confirmPassword.classList.add("success");
    }

    if (major.value === "") {
      major.classList.add("error");
      document.getElementById("majorError").style.visibility = "visible";
      hasError = true;
    } else {
      major.classList.add("success");
    }

    if (gradyear.value === "") {
      gradyear.classList.add("error");
      document.getElementById("gradyearError").style.visibility = "visible";
      hasError = true;
    } else {
      gradyear.classList.add("success");
    }

    if (hasError) return;

    const user = {
      name: nameInput.value,
      email: emailInput.value,
      password: password.value,
      major: major.value,
      gradyear: gradyear.value
    };

    try {
      if (hasError) {
        console.log("BLOCKED: validation failed");
        return;
      }

      console.log("ABOUT TO FETCH. hasError =", hasError);
      const res = await fetch("/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: nameInput.value.trim(),
          email: emailInput.value.trim(),
          password: password.value.trim()
        })
      });

      const data = await res.json();

      if (!res.ok) {
        password.classList.add("error");
        passwordError.textContent = data.error || "Login failed.";
        return;
      }

      localStorage.setItem("user", JSON.stringify(user));

      alert("Account created successfully!");
      form.reset();
      document.querySelectorAll("input, select").forEach(el => el.classList.remove("success"));
      localStorage.setItem("token", data.token);
      window.location.href = "dashboard.html";
    } catch (err) {
      passwordError.textContent = "Server error. Try again.";
    }

  });
</script>

</body>
</html>
