<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Internship Tracker</title>

  <!-- WORKING Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      color: #333;
    }

    header {
      background: #dcdcdc;
      padding: 20px;
      border-bottom: 1px solid #aaa;
    }

    .form-section {
      display: flex;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 80px);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      background: #fff;
      padding: 30px 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    label {
      font-weight: bold;
      text-align: left;
    }

    input, select {
      padding: 12px;
      border: 1px solid #aaa;
      border-radius: 5px;
      font-size: 1rem;
      width: 100%;
      height: 46px;
      box-sizing: border-box;
    }

    .password-container {
      position: relative;
      width: 100%;
    }

    .password-container input {
      padding-right: 40px;
      height: 46px;
      box-sizing: border-box;
    }

    .password-container i {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #555;
    }

    .error {
      border: 2px solid red;
    }

    .error-message {
      color: red;
      font-size: 0.85rem;
      visibility: hidden;  /* Keep space reserved */
      height: 18px;        /* Approximate line height */
      margin-top: -5px;
      margin-bottom: 5px;
    }

    button {
      padding: 10px;
      background: #007BFF;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

<header>
  <strong>Internship Tracker</strong>
</header>

<section class="form-section">
  <form id="signupForm" novalidate>

    <h2>Create Your Account</h2>

    <label>Full Name:</label>
    <input type="text" id="name">
    <div class="error-message" id="nameError">Please fill out this field.</div>

    <label>Email Address:</label>
    <input type="email" id="email">
    <div class="error-message" id="emailError">Please enter a valid email address.</div>

    <label>Create Password:</label>
    <div class="password-container">
      <input type="password" id="password">
      <i class="fa-solid fa-eye" onclick="togglePassword('password', this)"></i>
    </div>
    <div class="error-message" id="passwordError">Please fill out this field.</div>

    <label>Confirm Password:</label>
    <div class="password-container">
      <input type="password" id="confirmPassword">
      <i class="fa-solid fa-eye" onclick="togglePassword('confirmPassword', this)"></i>
    </div>
    <div class="error-message" id="confirmPasswordError">Passwords do not match.</div>

    <label>Major:</label>
    <select id="major">
      <option value="">Select Major</option>
      <option>Computer Science</option>
      <option>Computer Engineering</option>
      <option>Cybersecurity</option>
      <option>Business</option>
    </select>
    <div class="error-message" id="majorError">Please select a major.</div>

    <label>Graduation Year:</label>
    <select id="gradyear">
      <option value="">Select Year</option>
      <option>2026</option>
      <option>2027</option>
      <option>2028</option>
      <option>2029</option>
      <option>2030</option>
    </select>
    <div class="error-message" id="gradyearError">Please select a year.</div>

    <button type="submit">Create Account</button>

  </form>
</section>

<script>
  function togglePassword(fieldId, icon) {
    const input = document.getElementById(fieldId);
    if (input.type === "password") {
      input.type = "text";
      icon.classList.replace("fa-eye", "fa-eye-slash");
    } else {
      input.type = "password";
      icon.classList.replace("fa-eye-slash", "fa-eye");
    }
  }

  const form = document.getElementById("signupForm");

  form.addEventListener("submit", function(event) {
    event.preventDefault();

    const name = document.getElementById("name");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirmPassword");
    const major = document.getElementById("major");
    const gradyear = document.getElementById("gradyear");

    let hasError = false;

    // Clear old errors
    document.querySelectorAll("input, select").forEach(el => el.classList.remove("error"));
    document.querySelectorAll(".error-message").forEach(el => el.style.visibility = "hidden");

    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,}$/i;

    if (name.value.trim() === "") {
      name.classList.add("error");
      document.getElementById("nameError").style.visibility = "visible";
      hasError = true;
    }

    if (!emailPattern.test(email.value)) {
      email.classList.add("error");
      document.getElementById("emailError").style.visibility = "visible";
      hasError = true;
    }

    if (password.value.trim() === "") {
      password.classList.add("error");
      document.getElementById("passwordError").style.visibility = "visible";
      hasError = true;
    }

    if (password.value !== confirmPassword.value || confirmPassword.value === "") {
      confirmPassword.classList.add("error");
      document.getElementById("confirmPasswordError").style.visibility = "visible";
      hasError = true;
    }

    if (major.value === "") {
      major.classList.add("error");
      document.getElementById("majorError").style.visibility = "visible";
      hasError = true;
    }

    if (gradyear.value === "") {
      gradyear.classList.add("error");
      document.getElementById("gradyearError").style.visibility = "visible";
      hasError = true;
    }

    if (hasError) return;

    const user = {
      name: name.value,
      email: email.value,
      password: password.value,
      major: major.value,
      gradyear: gradyear.value
    };

    localStorage.setItem("user", JSON.stringify(user));

    alert("Account created successfully!");
    form.reset();
  });
</script>

</body>
</html>
