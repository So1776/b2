<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Internship Tracker</title>
  <style>
    /* General page styles like index.html */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      color: #333;
    }

    header {
      background: #dcdcdc;
      padding: 20px;
      border-bottom: 1px solid #aaa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header strong {
      font-size: 1.8rem;
    }

    nav a {
      margin-left: 1.5rem;
      font-weight: bold;
      text-decoration: none;
      color: #333;
    }

    /* Center the form section vertically and horizontally */
    .form-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: calc(100vh - 100px); /* full height minus header/footer */
      padding: 0 20px;
      text-align: center;
    }

    .form-section h2 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }

    /* Form styling like a card */
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: #fff;
      padding: 30px 40px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }

    label {
      text-align: left;
      font-weight: bold;
    }

    input {
      padding: 10px;
      border: 1px solid #aaa;
      border-radius: 5px;
      font-size: 1rem;
    }

    /* Buttons styled like index.html */
    button {
      padding: 10px;
      background: #007BFF;
      color: white;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 10px;
    }

    button:hover {
      background: #0056b3;
    }

    footer {
      background: #dcdcdc;
      padding: 20px;
      border-top: 1px solid #aaa;
      text-align: center;
    }
  </style>
</head>

<body>

<header>
  <div><strong>Internship Tracker</strong></div>
  <nav>
      <a href="index.html">Home</a>
      <a href="#">Our Mission</a>
      <a href="#">Find Internships</a>
  </nav>
</header>

<section class="form-section">
  <h2>Create Your Account</h2>

  <form id="signupForm">
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="name">

    <label for="email">Email Address:</label>
    <input type="email" id="email" name="email">

    <label for="password">Create Password:</label>
    <input type="password" id="password" name="password">

    <label for="major">Major:</label>
    <input type="text" id="major" name="major">

    <label for="gradyear">Graduation Year:</label>
    <input type="number" id="gradyear" name="gradyear">

    <button type="submit">Create Account</button>
  </form>
</section>

<script>
  const form = document.getElementById("signupForm");

  form.addEventListener("submit", function(event) {
    event.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const major = document.getElementById("major").value;
    const gradyear = document.getElementById("gradyear").value;

    if (
      name === "" ||
      email === "" ||
      password === "" ||
      major === "" ||
      gradyear === ""
    ) {
      alert("Please fill in all fields.");
    } else {
      alert("Account created successfully!");
      form.reset();
    }
  });
</script>

</body>
</html>
